name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-prod
  cancel-in-progress: false

jobs:
  build:
    name: Build Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build & Test
        run: node scripts/ci.js

      - name: Prepare production deploy
        run: |
          mkdir -p _site
          cp public/index.html _site/index.html
          cp public/manifest.json _site/manifest.json
          cp public/sw.js _site/sw.js
          cp public/icon-192.svg _site/icon-192.svg
          cp public/icon-512.svg _site/icon-512.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
